<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Upload</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
text-align:center;
width:350px;
}

h2{
margin-bottom:20px;
}

input{
margin:15px 0;
}

button{
background:#007bff;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

#preview{
margin-top:20px;
max-width:100%;
}

</style>
</head>

<body>

<div class="container">

<h2>Upload Image</h2>

<input type="file" id="imageInput">

<br>

<button onclick="uploadImage()">Upload</button>

<br>

<img id="preview"/>

<p id="message"></p>

</div>

<script>

function uploadImage(){

const fileInput=document.getElementById("imageInput");
const file=fileInput.files[0];

if(!file){
alert("Please select an image");
return;
}

const formData=new FormData();

formData.append("image",file);

fetch("https://happy.strlearners.site/api/upload",{

method:"POST",
body:formData

})
.then(res=>res.json())
.then(data=>{

document.getElementById("message").innerText="Upload successful";

})
.catch(err=>{
console.error(err);
});

document.getElementById("preview").src=URL.createObjectURL(file);

}

</script>

</body>
</html>
