<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Upload Gallery</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f6f9;
padding:40px;
}

/* Upload Box */

.container{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
max-width:420px;
margin:auto;
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
margin:10px 0;
}

button{
background:#007bff;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0056b3;
}

#preview{
margin-top:15px;
max-width:100%;
border-radius:6px;
display:none;
}

/* Gallery */

.gallery{
margin-top:50px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
border-radius:6px;
}

.delete-btn{
margin-top:8px;
background:red;
padding:6px 12px;
}

.delete-btn:hover{
background:#b30000;
}

.message{
margin-top:10px;
font-weight:bold;
}

.loader{
margin-top:10px;
font-size:14px;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<h2>Upload Image</h2>

<input type="file" id="imageInput" accept="image/*">

<br>

<button onclick="uploadImage()">Upload</button>

<img id="preview">

<p class="message" id="message"></p>
<p class="loader" id="loader"></p>

</div>

<div class="gallery" id="gallery"></div>

<script>

const API = "https://happy.strlearners.site/api";

/* ================= PREVIEW IMAGE ================= */

document.getElementById("imageInput").addEventListener("change",function(){

const file = this.files[0];

if(file){

const preview = document.getElementById("preview");

preview.src = URL.createObjectURL(file);
preview.style.display = "block";

}

});

/* ================= UPLOAD IMAGE ================= */

async function uploadImage(){

const input = document.getElementById("imageInput");
const file = input.files[0];

const message = document.getElementById("message");
const loader = document.getElementById("loader");

if(!file){
alert("Select an image first");
return;
}

try{

loader.innerText="Uploading...";
message.innerText="";

const formData = new FormData();
formData.append("image",file);

const res = await fetch(API+"/upload",{
method:"POST",
body:formData
});

if(!res.ok){
throw new Error("Upload failed");
}

const data = await res.json();

if(data.success){

message.style.color="green";
message.innerText="Upload successful";

input.value="";
document.getElementById("preview").style.display="none";

loadImages();

}else{

message.style.color="red";
message.innerText="Upload failed";

}

}catch(err){

console.error(err);

message.style.color="red";
message.innerText="Server error";

}

loader.innerText="";

}

/* ================= LOAD IMAGES ================= */

async function loadImages(){

try{

const res = await fetch(API+"/images");

const data = await res.json();

const gallery = document.getElementById("gallery");

gallery.innerHTML="";

data.data.forEach(img=>{

const card = document.createElement("div");
card.className="card";

card.innerHTML = `
<img src="${img.path}">
<button class="delete-btn" onclick="deleteImage('${img._id}')">Delete</button>
`;

gallery.appendChild(card);

});

}catch(err){

console.log("Error loading images");

}

}

/* ================= DELETE IMAGE ================= */

async function deleteImage(id){

if(!confirm("Delete this image?")) return;

try{

await fetch(API+"/delete/"+id,{
method:"DELETE"
});

loadImages();

}catch(err){

alert("Delete failed");

}

}

/* ================= INITIAL LOAD ================= */

loadImages();

</script>

</body>
</html>
